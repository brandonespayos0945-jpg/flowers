<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blue Lily Night Sky</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="sky">
    <div class="stars" id="stars1"></div>
    <div class="stars" id="stars2"></div>
    <div class="stars" id="stars3"></div>
  </div>

  <div id="particles"></div>

  <div class="garden">
    
    <div class="lily lily-left">
      <div class="petals">
        <div class="petal"></div><div class="petal"></div>
        <div class="petal"></div><div class="petal"></div>
        <div class="petal"></div><div class="petal"></div>
        <div class="center-glow"></div>
      </div>
      <div class="stem">
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
      </div>
    </div>

    <div class="lily lily-center">
      <div class="petals">
        <div class="petal"></div><div class="petal"></div>
        <div class="petal"></div><div class="petal"></div>
        <div class="petal"></div><div class="petal"></div>
        <div class="center-glow"></div>
      </div>
      <div class="stem">
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
      </div>
    </div>

    <div class="lily lily-right">
      <div class="petals">
        <div class="petal"></div><div class="petal"></div>
        <div class="petal"></div><div class="petal"></div>
        <div class="petal"></div><div class="petal"></div>
        <div class="center-glow"></div>
      </div>
      <div class="stem">
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
      </div>
    </div>

  </div>

  <script src="./script.js"></script>
</body>
</html>
